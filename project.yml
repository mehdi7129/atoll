name: Atoll
options:
  bundleIdPrefix: dev.mehdiguiard
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  AtollCore:
    path: AtollCore

targets:
  Atoll:
    type: application
    platform: macOS
    sources:
      - App
      - Shared
    dependencies:
      - package: AtollCore
      - target: atoll-bridge
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mehdiguiard.atoll
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: Shared/BridgingHeader.h
        CODE_SIGN_ENTITLEMENTS: App/Atoll.entitlements
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "3"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        DEAD_CODE_STRIPPING: YES
    info:
      path: App/Info.plist
      properties:
        CFBundleName: Atoll
        CFBundleDisplayName: Atoll
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Mehdi Guiard — GPL-3.0-or-later"
        NSAppleEventsUsageDescription: "Atoll utilise l'automatisation pour faire remonter au premier plan le terminal exact de la session Claude que vous ouvrez."
    postBuildScripts:
      - name: Embed atoll-bridge helper
        script: |
          HELPERS="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers"
          mkdir -p "$HELPERS"
          cp -f "${TARGET_BUILD_DIR}/atoll-bridge" "$HELPERS/atoll-bridge"
        inputFiles:
          - $(TARGET_BUILD_DIR)/atoll-bridge
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/atoll-bridge

  atoll-bridge:
    type: tool
    platform: macOS
    sources:
      - Bridge
      - Shared
    dependencies:
      - package: AtollCore
    settings:
      base:
        PRODUCT_NAME: atoll-bridge
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: Shared/BridgingHeader.h
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"

schemes:
  Atoll:
    build:
      targets:
        Atoll: all
    run:
      config: Debug
